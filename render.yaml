services:
  - type: web
    name: smartv2x-app
    env: python
    buildCommand: "./build.sh"
    startCommand: "python unified_server.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: smartv2x-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: smartv2x-db
    plan: free

