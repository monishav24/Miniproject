services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: v2x-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://v2x_db_user:CSaiVuxhyaR04trTrBTtk2Hk8pbQSmx9@dpg-d6fggnq4d50c73ed435g-a/v2x_db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

  # ── Frontend Dashboard ──────────────────────────────────
  - type: web
    name: v2x-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: v2x-backend
          property: url

databases:
  - name: v2x-db
    plan: free
