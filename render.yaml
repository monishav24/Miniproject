services:
  # ── Backend & Simulation API ──────────────────────────────
  - type: web
    name: v2x-unified-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn unified_server:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://v2x_db_user:CSaiVuxhyaR04trTrBTtk2Hk8pbQSmx9@dpg-d6fggnq4d50c73ed435g-a/v2x_db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

  # ── Frontend Dashboard ──────────────────────────────────
  - type: web
    name: v2x-dashboard
    env: static
    buildCommand: cd dashboard && npm install && npm run build
    publishPath: dashboard/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: v2x-unified-backend
          property: url

databases:
  - name: v2x-db
    plan: free
